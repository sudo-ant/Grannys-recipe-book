<!DOCTYPE html>
<html lang="en-GB">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14213D">
  <meta name="description" content="Granny’s Recipe Book — a collection of treasured family recipes.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Granny’s Recipes">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Granny’s Recipe Book</title>
</head>

<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-mark">
          <span class="dot" aria-hidden="true"></span>
          <span>Family favourites</span>
        </div>
        <h1 class="hero-title">Granny’s<br>Recipe Book</h1>
        <p class="hero-subtitle">
          A collection of treasured family recipes gathered by Granny and shared for the whole family.
        </p>
      </div>
    </header>

    <main class="main-panel">
      <section class="controls-card" aria-label="Recipe search and filters">
        <div class="search-row">
          <div>
            <label for="search" class="control-label">Search recipes</label>
            <input id="search" class="search-input" type="search"
              placeholder="Search by recipe name, ingredient, or section" autocomplete="off">
          </div>

          <div>
            <div class="control-label">Browse by section</div>
            <div class="filter-wrap" id="filters"></div>
          </div>
        </div>

        <div class="results-bar">
          <div class="results-left">
            <div id="results-count">Loading recipes…</div>
          </div>
          <div class="results-actions">
            <button class="filter-chip favourites-toggle" id="favourites-filter" type="button" aria-pressed="false">
              Favourites
            </button>
            <button class="clear-link" id="clear-filters" type="button" hidden>Clear filters</button>
          </div>
        </div>
      </section>

      <section class="cards-grid" id="recipe-cards" aria-live="polite">
        <div class="loading">Loading recipes…</div>
      </section>
    </main>

    <footer class="footer-note">
      Granny’s Recipe Book · <span id="year"></span>
    </footer>
  </div>

  <script src="./js/app.js"></script>
</body>

</html>
